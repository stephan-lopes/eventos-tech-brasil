name: Processar Evento

on:
  issues:
    types: [opened]

jobs:
  process_event:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'cadastrar/evento-presencial')
    steps:
      - name: Obter detalhes do evento da issue
        id: event_details
        run: |

          event_info="${{ github.event.issue.body }}"

          get_event_values() {
            local event_info="$1"
            local key_name="$2"

            echo "$event_info" | awk '/^###/ { key=$0; next }NF { print key ": " $0 }' | grep "$key_name" | sed 's/^.*: //'
          }

          event_name=$(get_event_values "$event_info" 'Nome do Evento')
          event_url=$(get_event_values "$event_info" 'Site do Evento')
          event_city=$(get_event_values "$event_info" 'Cidade do Evento')
          event_state=$(get_event_values "$event_info" 'Estado Federativo do Evento')
          event_year=$(get_event_values "$event_info" 'Ano do Evento')
          event_month=$(get_event_values "$event_info" 'Mês do Evento')
          event_day=$(get_event_values "$event_info" 'Dia do Evento')

          echo "event_name=$event_name" >> $GITHUB_OUTPUT
          echo "event_url=$event_url" >> $GITHUB_OUTPUT
          echo "event_city=$event_city" >> $GITHUB_OUTPUT
          echo "event_state=$event_state" >> $GITHUB_OUTPUT
          echo "event_year=$event_year" >> $GITHUB_OUTPUT
          echo "event_month=$event_month" >> $GITHUB_OUTPUT
          echo "event_day=$event_day" >> $GITHUB_OUTPUT

      - name: Criar evento com base nos valores inseridos
        id: create_string
        run: |

          capitalize_first_letter() {
            echo "$1" | awk '{ for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2); }1'
          }

          extract_abbreviation() {
              local input="$1"
              echo "$input" | sed -E 's/.*\(([^)]+)\).*/\1/'
          }

          day="${{ steps.event_details.outputs.event_day }}"
          name="${{ steps.event_details.outputs.event_name }}"
          url="${{ steps.event_details.outputs.event_url }}"
          city="${{ steps.event_details.outputs.event_city }}"
          state="${{ steps.event_details.outputs.event_state }}"
          type="Presencial"
          month=$(extract_abbreviation "${{ steps.event_details.outputs.event_month }}")

          if [[ $day == "_No response_" ]]; then
            month=TBA
          fi

          if [[ $month == "TBA" ]]; then
            string="- ${month}: [${name}](${url,,}) - _$(capitalize_first_letter "${city,,}")/$(extract_abbreviation "${state}")_ ![${type,,}]"
            echo $string
          else
            string="- ${day}: [${name}](${url,,}) - _$(capitalize_first_letter "${city,,}")/$(extract_abbreviation "${state}")_ ![${type,,}]"
            echo $string
          fi

          echo "string=$string" >> $GITHUB_OUTPUT

      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Modifica o README com bases nos valores informados
        env:
          README_PATH: "./README.md"
        run: |

          get_month_name() {
            local input="$1"
            echo "$input" | sed -E 's/ *\([^)]*\)//g; s/^[ ]*//; s/[ ]*$//' | tr '[:upper:]' '[:lower:]'
          }

          format_event_date() {
              local date_str="$1"
              date_str=$(echo "$date_str" | sed 's/ *[e,] */ /g')
              local days=($date_str)
              local num_days=${#days[@]}
              if (( num_days == 1 )); then
                  echo "${days[0]}"
              elif (( num_days == 2 )); then
                  echo "${days[0]} e ${days[1]}"
              else
                  local formatted=""
                  for ((i=0; i<num_days-1; i++)); do
                      formatted+="${days[i]}, "
                  done
                  formatted+="e ${days[num_days-1]}"
                  echo "$formatted"
              fi
          }


          day="${{ steps.event_details.outputs.event_day }}"
          month=$(get_month_name "${{ steps.event_details.outputs.event_month }}")
          year="${{ steps.event_details.outputs.event_year }}"

          month_start="<!-- $(tr '[:lower:]' '[:upper:]' <<< "$month"):START -->"
          month_end="<!-- $(tr '[:lower:]' '[:upper:]' <<< "$month"):END -->"
          year_start="<!-- ANO${year}:START -->"
          year_end="<!-- ANO${year}:END -->"

          if  [[ $day == "_No response_" ]]; then
            month="to be announced"
          fi

          if [[ $month == "to be announced" ]]; then
            month_start="<!-- $(tr '[:lower:]' '[:upper:]' <<< "$month"):START -->"
            month_end="<!-- $(tr '[:lower:]' '[:upper:]' <<< "$month"):END -->"
            year_start="<!-- TBA:START -->"
            year_end="<!-- TBA:END -->"          
          fi

          content=$(<"$README_PATH")

          section_year_start=$(grep -n "$year_start" "$README_PATH" | cut -d: -f1)
          section_year_end=$(grep -n "$year_end" "$README_PATH" | cut -d: -f1)

          if [ -z "$section_year_start" ] || [ -z "$section_year_end" ]; then
              echo "Seção de ano $year não encontrada."
              exit 1
          fi

          section_month_start=$(sed -n "${section_year_start},${section_year_end}p" "$README_PATH" | grep -n "$month_start" | cut -d: -f1)

          if [ -z "$section_month_start" ]; then
              echo "Seção do mês $month não encontrada dentro do ano $year."
              exit 1
          fi

          section_month_start=$((section_month_start + section_year_start - 1))
          section_month_end=$(sed -n "${section_month_start},${section_year_end}p" "$README_PATH" | grep -n "$month_end" | cut -d: -f1)

          if [ -z "$section_month_end" ]; then
              echo "Seção do mês não encontrada."
              exit 1
          fi

          section_month_end=$((section_month_end + section_month_start - 1))
          events_section=$(sed -n "$((section_month_start + 1)),$((section_month_end - 1))p" "$README_PATH")



          event="${{ steps.create_string.outputs.string }}"
          new_event=$(format_event_date "$event")

          # Insere o novo evento na posição correta considerando múltiplos dias
          if [[ $(echo "$events_section" | wc -l) -le 2 ]]; then
              # Se a seção de eventos estiver vazia, apenas adiciona o novo evento
              updated_section="$new_event"
          else
              # Insere na posição correta
              updated_section=$(echo "$events_section" | awk -v new_event="$new_event" '
                  function parse_event_line(line) {
                      # Extrai a data e o número de dias
                      if (match(line, /^- ([0-9]+( e [0-9]+)*):/, arr)) {
                          date_str = arr[1]
                          split(date_str, date_arr, " e ")
                          start_day = date_arr[1] + 0
                          num_days = length(date_arr)
                          return start_day ":" num_days
                      }
                      return ""
                  }
                  BEGIN {
                      insert = 0
                      new_info = parse_event_line(new_event)
                      split(new_info, new_vals, ":")
                      new_start_day = new_vals[1] + 0
                      new_num_days = new_vals[2] + 0
                  }
                  {
                      line_info = parse_event_line($0)
                      if (line_info != "") {
                          split(line_info, vals, ":")
                          current_start_day = vals[1] + 0
                          current_num_days = vals[2] + 0

                          if (insert == 0) {
                              if (new_start_day < current_start_day) {
                                  print new_event
                                  insert = 1
                              } else if (new_start_day == current_start_day) {
                                  if (new_num_days < current_num_days) {
                                      print new_event
                                      insert = 1
                                  }
                              }
                          }
                      }
                      print $0
                  }
                  END {
                      if (insert == 0) {
                          print new_event
                      }
                  }
              ')
          fi

          # Atualiza o arquivo README.md usando awk
          awk -v start_marker="$month_start" -v end_marker="$month_end" -v replacement="$updated_section" '
              BEGIN { in_section=0 }
              {
                  if ($0 ~ start_marker) {
                      print $0
                      in_section=1
                      next
                  }
                  if ($0 ~ end_marker) {
                      in_section=0
                      print replacement
                      print $0
                      next
                  }
                  if (!in_section) {
                      print $0
                  }
              }
          ' "$README_PATH" > "$README_PATH.tmp"

          # Substitui o arquivo original pelo atualizado
          mv "$README_PATH.tmp" "$README_PATH"

          cat $README_PATH

          # echo "$new_content"

          # echo "$month"
          # echo "$month_start"
          # echo "$month_end"
          # echo "$year_start"
          # echo "$year_end"
          # echo "$events_section"
