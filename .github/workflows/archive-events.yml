name: Criar PR para Arquivar Agendas e Eventos
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  reviewers: "pachicodes,stephan-lopes"

jobs:
  archive-events:
    if: contains(github.event.issue.labels.*.name, 'arquivar')
    runs-on: ubuntu-latest
    steps:
      - name: Clone do Repositório
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Obter detalhes do mês e ano da issue
        id: issue_details
        run: |

          event_info="${{ github.event.issue.body }}"

          get_event_values() {
            local event_info="$1"
            local key_name="$2"

            echo "$event_info" | awk '/^###/ { key=$0; next }NF { print key ": " $0 }' | grep "$key_name" | sed 's/^[^:]*: //'
          }

          event_name=$(get_event_values "$event_info" 'Nome do(a) Evento/Agenda')

          archive_month=$(get_event_values "$event_info" 'Mês para ser Arquivado')
          archive_year=$(get_event_values "$event_info" 'Ano do Mês a ser Arquivado ou Ano a ser arquivado')

          if [[ $archive_month == "None" ]]; then
            archive_month=""
          fi

          echo "archive_month=${archive_month}" >> $GITHUB_ENV
          echo "archive_year=${archive_year}" >> $GITHUB_ENV
          echo "event_name=${event_name}" >> $GITHUB_ENV

      - name: Arquivar o Mês/Ano
        run: |
          pip3 install -r src/requirements.txt
          python3 src/archive.py

      - name: Set up Git
        run: |
          git config --global user.name "${{ github.event.issue.user.login }}"
          git config --global user.email "${{ github.event.issue.user.login }}@users.noreply.github.com"

      - name: Commitar alterações na develop
        run: |
          git add src/db/database.json

          if [ -z "$(git status --porcelain)" ]; then
            echo "Nenhuma alteração para comitar. Encerrando."
            exit 0
          fi

          git commit -m "Arquivando evento: ${{ env.event_name }}" -m "Closes #${{ github.event.issue.number }}"
          git push origin develop

      - name: Criar Pull Request
        run: |
          # Verifica se já existe PR aberto de develop para main
          EXISTING_PR=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Já existe PR aberto de develop para main (#$EXISTING_PR). Não vou criar outro."
            exit 0
          fi

          echo "Nenhum PR aberto de develop para main. Criando novo PR..."

          gh pr create \
            --base main \
            --head develop \
            --title "Novos Eventos Prontos para Aprovação!" \
            --reviewer "${{ env.reviewers }}"

        env:
          GH_TOKEN: ${{ github.token }}
